<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart Lender - Loan Application</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/input.css') }}">
    <a href="/dashboard">Dashboard</a>

    <style>

        *{
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            margin:0;
            padding:0;
            background:#f2f4f8;
        }

        .container{
            width:600px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 15px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#0d6efd;
            margin-bottom:30px;
        }

        label{
            display:block;
            font-weight:bold;
            margin-bottom:6px;
        }

        input[type=number],
        select{
            width:100%;
            padding:12px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:15px;
        }

        input[type=submit]{
            width:100%;
            background:#198754;
            color:white;
            padding:14px;
            border:none;
            border-radius:5px;
            font-size:18px;
            cursor:pointer;
        }

        input[type=submit]:hover{
            background:#146c43;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Smart Lender</h1>
    <h3>Loan Approval Prediction System</h3>

    <form action="/submit" method="post">

<label for="Gender">Gender</label>

<select id="Gender" name="Gender" required>
    <option value="" disabled selected>Select Gender</option>
    <option value="1">Male</option>
    <option value="0">Female</option>
</select>


<label for="Married">Marital Status</label>

<select id="Married" name="Married" required>
    <option value="" disabled selected>Select Marital Status</option>
    <option value="1">Married</option>
    <option value="0">Unmarried</option>
</select>


<label for="Dependents">Number of Dependents</label>

<input
type="number"
id="Dependents"
name="Dependents"
placeholder="Enter Number of Dependents"
min="0"
required>


<label for="Education">Education</label>

<select id="Education" name="Education" required>
    <option value="" disabled selected>Select Education</option>
    <option value="1">Graduate</option>
    <option value="0">Not Graduate</option>
</select>


<label for="Self_Employed">Self Employed</label>

<select id="Self_Employed" name="Self_Employed" required>
    <option value="" disabled selected>Select Employment Type</option>
    <option value="1">Yes</option>
    <option value="0">No</option>
</select>


<label for="ApplicantIncome">Applicant Income</label>

<input
type="number"
id="ApplicantIncome"
name="ApplicantIncome"
placeholder="Enter Applicant Income (₹)"
min="0"
required>


<label for="CoapplicantIncome">Coapplicant Income</label>

<input
type="number"
id="CoapplicantIncome"
name="CoapplicantIncome"
placeholder="Enter Coapplicant Income (₹)"
min="0"
required>


<label for="LoanAmount">Loan Amount</label>

<input
type="number"
id="LoanAmount"
name="LoanAmount"
placeholder="Enter Loan Amount"
min="1"
required>


<label for="Loan_Amount_Term">Loan Amount Term (Months)</label>

<input
type="number"
id="Loan_Amount_Term"
name="Loan_Amount_Term"
placeholder="Example: 360"
min="1"
required>


<label for="Credit_History">Credit History</label>

<select id="Credit_History" name="Credit_History" required>
    <option value="" disabled selected>Select Credit History</option>
    <option value="1">Good</option>
    <option value="0">Bad</option>
</select>


<label for="Property_Area">Property Area</label>

<select id="Property_Area" name="Property_Area" required>
    <option value="" disabled selected>Select Property Area</option>
    <option value="0">Rural</option>
    <option value="1">Semiurban</option>
    <option value="2">Urban</option>
</select>


<input type="submit" value="Predict Loan Status">

</form>
<div class="footer">
    © 2026 Smart Lender | AI-Powered Loan Approval Prediction
</div>

</div>

</body>

</html>
