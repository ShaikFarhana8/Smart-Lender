<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Prediction Result</title>

    <style>

        *{
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            margin:0;
            padding:0;
            background:#f4f4f4;
        }

        .container{
            width:750px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
            text-align:center;
        }

        h1{
            color:#0d6efd;
            margin-bottom:25px;
        }

        .card{
            background:#f8f9fa;
            padding:20px;
            margin-top:20px;
            border-radius:8px;
            border-left:6px solid #0d6efd;
        }

        .prediction{
            font-size:30px;
            font-weight:bold;
            color:#198754;
        }

        .probability{
            font-size:28px;
            color:#0d6efd;
            font-weight:bold;
        }

        .score{
            font-size:30px;
            color:#fd7e14;
            font-weight:bold;
        }

        .risk{
            font-size:28px;
            font-weight:bold;
        }

        .reason-box{
            margin-top:25px;
            background:#f8f9fa;
            padding:20px;
            border-radius:8px;
            text-align:left;
        }

        .reason-box h3{
            text-align:center;
        }

        ul{
            font-size:18px;
            line-height:35px;
        }

        .btn{
            display:inline-block;
            margin-top:30px;
            padding:12px 30px;
            background:#0d6efd;
            color:white;
            text-decoration:none;
            border-radius:6px;
            font-size:18px;
        }

        .btn:hover{
            background:#0b5ed7;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Smart Lender</h1>

    <div class="card">

        <h3>Prediction Result</h3>

        <div class="prediction">

            {{ prediction }}

        </div>

    </div>

    <div class="card">

        <h3>Approval Probability</h3>

        <div class="probability">

            {{ probability }} %

        </div>

    </div>

    <div class="card">

        <h3>Loan Eligibility Score</h3>

        <div class="score">

            {{ score }}/100

        </div>

    </div>

    <div class="card">

        <h3>Risk Level</h3>

        <div class="risk">

            {{ risk }}

        </div>

    </div>
    <div class="card">

    <h3>Estimated Monthly EMI</h3>

    <div class="score">

        ₹ {{ emi }}

    </div>

</div>

    <div class="reason-box">

        <h3>Reason for Prediction</h3>

        <ul>

            {% for reason in reasons %}

                <li>{{ reason }}</li>

            {% endfor %}

        </ul>

    </div>

    <a href="/input" class="btn">Predict Again</a>

</div>

</body>

</html>
